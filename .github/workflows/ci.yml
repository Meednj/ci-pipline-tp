name: partie I
on:
push:
  braches:
    - main
pull-request:
  branches:
    - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Recuperer code
      uses: actions/checkout@4
    - name: installer py 3.11
      uses: actions/setup-python@5
      with:
          python-version: "3.11"
    - name: installer dependances
      run: pip installl -r requirements.txt
    - name: flake8
    - run: |
        flake8 app --count 00select-E9,F63,F7,F82,F831 --show-source --statistics
        flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
        flake8 tests --count --max-line -length=127 --statistics

  tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Recuperer code
        uses: actions/checkout@4
      - name: installer py 3.11
        uses: actions/setup-python@5
        with:
          python-version: "3.11"
      - name: installer dependances
        run: pip installl -r requirements.txt
      - name: lancer test
        run: python -m -pytest -v --cov=app
  build:
    runs-on: ubuntu-latest
    need: test
    steps:
      - name: Recuperer code
        uses: actions/checkout@4
      - name: installer py 3.11
        uses: actions/setup-python@5
        with:
          python-version: "3.11"
      - name: install build
        run: pip install build
      - name: generer le package py
        run: python -m build
      - name: upload du resultat
        uses: actions/upload-artifact@v3