name: partie I

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: recuperer code
        uses: actions/checkout@v4

      - name: installer python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: installer dependances
        run: pip install -r requirements.txt

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: recuperer code
        uses: actions/checkout@v4

      - name: installer python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: installer dependances
        run: pip install -r requirements.txt

      - name: flake8
        run: |
          flake8 app --count --select=E9,F63,F7,F82,F831 --show-source --statistics
          flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
          flake8 tests --count --max-line-length=127 --statistics

  tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: recuperer code
        uses: actions/checkout@v4

      - name: installer python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: installer dependances
        run: pip install -r requirements.txt

      - name: lancer test
        run: python -m pytest -v --cov=app